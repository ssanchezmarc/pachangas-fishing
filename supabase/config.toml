# Minimal Supabase project config for `supabase start` (local) and CI.
# The real (cloud) project is provisioned manually — see ONBOARDING / todo-list.
project_id = "pachangas-fishing"

[db]
port = 54322
major_version = 15

[studio]
port = 54323

[auth]
enabled = true
# Only the committee has a login (Supabase Auth). Participants and controllers do not.
site_url = "http://localhost:3000"
# Issue 36/37 — the invitation email link lands on the auth callback. Every redirect
# target must be allow-listed (cloud: add the prod URL in the dashboard too).
additional_redirect_urls = ["http://localhost:3000/api/auth/confirm"]

[auth.email]
# Local dev captures outbound mail in Inbucket (http://localhost:54324).
# In production, configure custom SMTP — the default Supabase mailer is rate-limited
# (~3-4/hour) and not meant for real invitations.
enable_signup = true
enable_confirmations = true

[storage]
enabled = true
# Private bucket for scorecard photos (evidence). Created by the storage migration.
